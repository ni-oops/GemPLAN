<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemPLAN 4.2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');

        :root {
            --bg: #0d0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #8892b0;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --urgent: #f78166;
            --success: #7ee787;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(41, 50, 81, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 30, 48, 0.2) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; padding: 40px 20px; min-height: 100vh;
        }

        .container { max-width: 1400px; width: 100%; margin: 0 auto; }
        h1 { font-weight: 200; font-size: 3rem; letter-spacing: -2px; margin-bottom: 50px; text-align: center; opacity: 0.8; }

        .grid { column-count: 3; column-gap: 30px; width: 100%; }
        @media (max-width: 1100px) { .grid { column-count: 2; } }
        @media (max-width: 768px) { .grid { column-count: 1; } }

        .category {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 30px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            break-inside: avoid;
            transition: border-color 0.2s ease;
            cursor: grab;
        }

        .cat-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;
        }

        .category h2 { 
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.3em; 
            color: var(--accent); margin: 0; font-weight: 600; outline: none; flex: 1; 
            cursor: text; user-select: text;
        }

        .task-list { display: flex; flex-direction: column; gap: 12px; min-height: 30px; }

        .task-item {
            display: grid; grid-template-columns: 22px 1fr auto; gap: 15px;
            align-items: start; padding: 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent; border-radius: 18px;
            transition: all 0.2s ease; cursor: grab;
        }
        .task-item:hover { background: rgba(255,255,255,0.05); }

        .drag-target-top { border-top: 2px solid var(--accent) !important; }
        .drag-target-bottom { border-bottom: 2px solid var(--accent) !important; }
        .drag-target-cat { border: 1px solid var(--accent) !important; background: rgba(255,255,255,0.05) !important; }

        .checkbox {
            width: 22px; height: 22px; border: 1px solid var(--glass-border);
            border-radius: 7px; margin-top: 1px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .task-item.done .checkbox { background: var(--success); border-color: var(--success); }
        .task-item.done .checkbox::after { content: '✓'; color: var(--bg); font-weight: bold; font-size: 14px; }

        .task-content { display: flex; flex-direction: column; gap: 8px; }
        .task-text { font-size: 1.05rem; font-weight: 300; outline: none; line-height: 1.4; cursor: text; user-select: text; }
        .task-item.done .task-text { opacity: 0.3; text-decoration: line-through; }

        .date-display {
            font-size: 0.85rem; color: var(--urgent); font-weight: 400; cursor: pointer;
            display: flex; align-items: center; gap: 6px; width: fit-content;
        }
        .date-display.empty { color: var(--text-dim); opacity: 0.3; }
        .date-display svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }

        .delete-btn, .cat-delete-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; opacity: 0.2; transition: 0.2s; }
        .task-item:hover .delete-btn, .cat-header:hover .cat-delete-btn { opacity: 1; }

        /* Кнопки и формы */
        .inline-add { margin-top: 20px; }
        .add-toggle-btn {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border);
            color: var(--accent); padding: 14px; border-radius: 16px; cursor: pointer; 
            font-size: 0.9rem; transition: all 0.2s; text-align: center;
        }
        .add-toggle-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }

        .mini-form { display: none; flex-direction: column; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid var(--glass-border); cursor: default; }
        .mini-form input { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 10px; font-family: inherit; outline: none; flex: 1; }
        
        .icon-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: white; width: 44px; height: 44px; display: flex; align-items: center; 
            justify-content: center; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .icon-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        .add-category-card {
            border: 2px dashed var(--glass-border); border-radius: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            min-height: 100px; cursor: pointer; opacity: 0.5; width: 100%; box-sizing: border-box; margin-bottom: 30px; break-inside: avoid;
        }
        .add-category-card:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

        /* Модальные окна */
        #calendarModal, #confirmModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-container { background: #161821; border: 1px solid var(--glass-border); border-radius: 32px; padding: 35px; width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-cell { padding: 10px 0; border-radius: 10px; cursor: pointer; }
        .cal-cell.selected { background: var(--accent); color: var(--bg); font-weight: 600; }

        /* Стили окна подтверждения */
        .confirm-title { font-size: 1.1rem; font-weight: 400; margin-bottom: 25px; text-align: center; line-height: 1.5; color: var(--text-main); }
        .confirm-btns { display: flex; gap: 12px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: 0.2s; }
        .btn-yes { background: var(--urgent); color: white; }
        .btn-yes:hover { opacity: 0.8; }
        .btn-no { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); }
        .btn-no:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        
        .footer { max-width: 1400px; width: 100%; margin: 0 auto; margin-top: 180px; }
        p { font-weight: 80; font-size: 1rem; letter-spacing: 1px; margin-bottom: 80px; text-align: left; opacity: 0.8; }
        /* Ненажатая/посещенная ссылка (стиль по умолчанию) */
		a {
    	color: #727a93; /* Цвет текста */
    	text-decoration: none; /* Убрать подчеркивание */
    	transition: 0.3s; /* Плавное переключение */
		}

		/* При наведении (hover) */
		a:hover {
    	color: #f78166;
    	text-decoration: underline;
		}

		/* Активная ссылка (в момент нажатия) */
		a:active {
    	color: #7ee787;
		}

    </style>
</head>
<body>

<div class="container">
    <h1>Планировщик</h1>
    <div class="grid" id="mainGrid"></div>
</div>

<!-- Модалка Календаря -->
<div id="calendarModal" onclick="closeCalendar(event)">
    <div class="modal-container" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">←</button>
            <span id="calMonthYear" style="color:var(--accent); text-transform:uppercase; font-weight:600;"></span>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">→</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <button style="background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:10px; border-radius:12px; cursor:pointer; width:100%; margin-top:20px;" onclick="selectDate('')">Сбросить дату</button>
    </div>
</div>

<!-- Модалка Подтверждения -->
<div id="confirmModal" onclick="closeConfirm(false)">
    <div class="modal-container" onclick="event.stopPropagation()">
        <div class="confirm-title">Удалить рубрику со всеми задачами?</div>
        <div class="confirm-btns">
            <button class="btn-modal btn-yes" onclick="closeConfirm(true)">Удалить</button>
            <button class="btn-modal btn-no" onclick="closeConfirm(false)">Отмена</button>
        </div>
    </div>
</div>

<script>
    let categories = JSON.parse(localStorage.getItem('p_cats_v12')) || [
        { id: 'cat-1', title: 'Срочное' },
        { id: 'cat-2', title: 'Работа' },
        { id: 'cat-3', title: 'Отдых' }
    ];

    let tasks = JSON.parse(localStorage.getItem('p_tasks_v12')) || [
        { id: 1, cat: 'cat-1', text: 'Новая задача', date: '2026-05-10', done: false }
    ];

    let currentEditingId = null;
    let calDate = new Date();
    let activeFormId = null;
    let tempTaskText = {};
    let tempNewTaskDates = {};
    let categoryToDeleteId = null;

    let dragType = null;
    let draggedId = null;

    const iconCalendar = `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`;

    function formatDate(dateStr) {
        if (!dateStr) return null;
        const date = new Date(dateStr);
        const options = { day: 'numeric', month: 'long' };
        const weekday = new Intl.DateTimeFormat('ru-RU', { weekday: 'short' }).format(date);
        return `${date.toLocaleDateString('ru-RU', options)}, ${weekday}`;
    }

    function save() {
        localStorage.setItem('p_cats_v12', JSON.stringify(categories));
        localStorage.setItem('p_tasks_v12', JSON.stringify(tasks));
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';

        categories.forEach(cat => {
            const block = document.createElement('div');
            block.className = 'category';
            block.id = cat.id;
            block.draggable = true;
            
            block.onmouseover = (e) => { if(e.target.tagName === 'H2' || e.target.closest('.inline-add')) block.draggable = false; };
            block.onmouseout = () => block.draggable = true;
            
            block.ondragstart = (e) => { dragType = 'cat'; draggedId = cat.id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => block.style.opacity = '0.4', 0); };
            block.ondragend = () => { block.style.opacity = '1'; clearIndicators(); };
            block.ondragover = (e) => { 
                e.preventDefault(); clearIndicators();
                if(dragType === 'cat' && draggedId !== cat.id) block.classList.add('drag-target-cat');
                if(dragType === 'task') {
                    const targetTask = e.target.closest('.task-item');
                    if(targetTask) {
                        const rect = targetTask.getBoundingClientRect();
                        targetTask.classList.add(e.clientY > rect.top + rect.height/2 ? 'drag-target-bottom' : 'drag-target-top');
                    } else { block.classList.add('drag-target-cat'); }
                }
            };
            block.ondrop = handleDrop;

            const isFormActive = activeFormId === cat.id;
            const dateStr = tempNewTaskDates[cat.id] ? formatDate(tempNewTaskDates[cat.id]) : null;

            block.innerHTML = `
                <div class="cat-header">
                    <h2 contenteditable="true" onblur="updateCatTitle('${cat.id}', this.innerText)">${cat.title}</h2>
                    <button class="cat-delete-btn" onclick="removeCategory('${cat.id}')">×</button>
                </div>
                <div class="task-list"></div>
                <div class="inline-add">
                    <button class="add-toggle-btn" style="display:${isFormActive ? 'none' : 'block'}" onclick="showForm('${cat.id}')">+ Добавить задачу</button>
                    <div class="mini-form" id="form-${cat.id}" style="display:${isFormActive ? 'flex' : 'none'}">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <input type="text" placeholder="Что сделать?" id="in-t-${cat.id}" value="${tempTaskText[cat.id] || ''}" oninput="tempTaskText['${cat.id}'] = this.value">
                            <button class="icon-btn" onclick="openCalendar('${cat.id}')">${iconCalendar}</button>
                        </div>
                        ${dateStr ? `<div class="date-display" onclick="openCalendar('${cat.id}')">${iconCalendar} ${dateStr}</div>` : ''}
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <button onclick="addTask('${cat.id}')" style="flex:2; background:var(--accent); border:none; padding:12px; border-radius:12px; cursor:pointer; font-weight:600">ОК</button>
                            <button onclick="cancelAdd('${cat.id}')" style="flex:1; background:none; border:1px solid var(--glass-border); color:white; border-radius:12px; cursor:pointer">×</button>
                        </div>
                    </div>
                </div>
            `;
            
            const list = block.querySelector('.task-list');
            tasks.filter(t => t.cat === cat.id).forEach(t => {
                const item = document.createElement('div');
                item.className = `task-item ${t.done ? 'done' : ''}`;
                item.dataset.id = t.id;
                item.draggable = true;
                item.onmouseover = (e) => { if(e.target.classList.contains('task-text') || e.target.closest('.checkbox') || e.target.closest('.delete-btn')) item.draggable = false; };
                item.onmouseout = () => item.draggable = true;
                item.ondragstart = (e) => { e.stopPropagation(); dragType = 'task'; draggedId = t.id; setTimeout(() => item.style.opacity = '0.3', 0); };
                item.ondragend = () => { item.style.opacity = '1'; clearIndicators(); };
                const taskDate = formatDate(t.date);
                item.innerHTML = `
                    <div class="checkbox" onclick="toggleTask(${t.id})"></div>
                    <div class="task-content">
                        <div class="task-text" contenteditable="true" onblur="updateTask(${t.id}, 'text', this.innerText)">${t.text}</div>
                        <span class="date-display ${!taskDate ? 'empty' : ''}" onclick="openCalendar(${t.id})">${iconCalendar} ${taskDate || ''}</span>
                    </div>
                    <button class="delete-btn" onclick="removeTask(${t.id})">×</button>
                `;
                list.appendChild(item);
            });
            grid.appendChild(block);
            if (isFormActive) {
                const input = document.getElementById(`in-t-${cat.id}`);
                input.focus(); input.setSelectionRange(input.value.length, input.value.length);
            }
        });

        const addCatBtn = document.createElement('div');
        addCatBtn.className = 'add-category-card';
        addCatBtn.innerHTML = '<span>+ Новая рубрика</span>';
        addCatBtn.onclick = () => { categories.push({ id: 'cat-' + Date.now(), title: 'Новая рубрика' }); save(); };
        grid.appendChild(addCatBtn);
    }

    function clearIndicators() { document.querySelectorAll('.drag-target-top, .drag-target-bottom, .drag-target-cat').forEach(el => el.classList.remove('drag-target-top', 'drag-target-bottom', 'drag-target-cat')); }

    function handleDrop(e) {
        e.preventDefault();
        if (!dragType) return;
        if (dragType === 'cat') {
            const targetCat = e.target.closest('.category');
            if (targetCat && targetCat.id !== draggedId) {
                const oldIdx = categories.findIndex(c => c.id === draggedId);
                const newIdx = categories.findIndex(c => c.id === targetCat.id);
                const [moved] = categories.splice(oldIdx, 1);
                categories.splice(newIdx, 0, moved);
            }
        } else if (dragType === 'task') {
            const targetTask = e.target.closest('.task-item');
            const targetCat = e.target.closest('.category');
            const taskIdx = tasks.findIndex(t => t.id === draggedId);
            const [task] = tasks.splice(taskIdx, 1);
            if (targetTask) {
                const rect = targetTask.getBoundingClientRect();
                const after = e.clientY > rect.top + rect.height/2;
                const targetIdx = tasks.findIndex(t => t.id === parseInt(targetTask.dataset.id));
                task.cat = tasks[targetIdx].cat;
                tasks.splice(after ? targetIdx + 1 : targetIdx, 0, task);
            } else if (targetCat) { task.cat = targetCat.id; tasks.push(task); }
        }
        save();
    }

    // ЛОГИКА ОКНА ПОДТВЕРЖДЕНИЯ
    function removeCategory(id) {
        categoryToDeleteId = id;
        document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirm(confirm) {
        if (confirm && categoryToDeleteId) {
            categories = categories.filter(c => c.id !== categoryToDeleteId);
            tasks = tasks.filter(t => t.cat !== categoryToDeleteId);
            save();
        }
        document.getElementById('confirmModal').style.display = 'none';
        categoryToDeleteId = null;
    }

    // Календарь
    function openCalendar(id) { currentEditingId = id; const d = typeof id === 'number' ? tasks.find(t => t.id === id).date : tempNewTaskDates[id]; calDate = d ? new Date(d) : new Date(); document.getElementById('calendarModal').style.display='flex'; renderCalendarUI(); }
    function closeCalendar(e) { if(!e || e.target.id === 'calendarModal') document.getElementById('calendarModal').style.display='none'; }
    function selectDate(d) { if(typeof currentEditingId === 'number') updateTask(currentEditingId, 'date', d); else { tempNewTaskDates[currentEditingId] = d; render(); } closeCalendar(); }
    function renderCalendarUI() { const g = document.getElementById('calGrid'); const m = document.getElementById('calMonthYear'); g.innerHTML = ''; const y = calDate.getFullYear(); const month = calDate.getMonth(); const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"]; m.innerText = `${monthNames[month]} ${y}`; ["пн","вт","ср","чт","пт","сб","вс"].forEach(d => g.innerHTML += `<div style="font-size:0.7rem; opacity:0.5; padding-bottom:10px;">${d}</div>`); const f = new Date(y, month, 1).getDay(); const offset = f === 0 ? 6 : f - 1; for(let i=0; i<offset; i++) g.innerHTML += '<div class="cal-cell"></div>'; const days = new Date(y, month+1, 0).getDate(); const sel = typeof currentEditingId === 'number' ? tasks.find(t => t.id === currentEditingId).date : tempNewTaskDates[currentEditingId]; for(let d=1; d<=days; d++){ const dStr = new Date(y, month, d+1).toISOString().split('T')[0]; const cell = document.createElement('div'); cell.className = `cal-cell ${dStr === sel ? 'selected' : ''}`; cell.innerText = d; cell.onclick = () => selectDate(dStr); g.appendChild(cell); } }
    function changeMonth(v) { calDate.setMonth(calDate.getMonth() + v); renderCalendarUI(); }
    function addTask(id) { if(!tempTaskText[id]) return; tasks.push({ id: Date.now(), cat: id, text: tempTaskText[id], date: tempNewTaskDates[id] || '', done: false }); delete tempTaskText[id]; delete tempNewTaskDates[id]; activeFormId = null; save(); }
    function cancelAdd(id) { delete tempTaskText[id]; delete tempNewTaskDates[id]; activeFormId = null; render(); }
    function showForm(id) { activeFormId = id; render(); }
    function updateCatTitle(id, v) { categories = categories.map(c => c.id === id ? {...c, title: v} : c); localStorage.setItem('p_cats_v12', JSON.stringify(categories)); }
    function updateTask(id, f, v) { tasks = tasks.map(t => t.id === id ? {...t, [f]: v} : t); localStorage.setItem('p_tasks_v12', JSON.stringify(tasks)); if(f === 'date') render(); }
    function toggleTask(id) { tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t); save(); }
    function removeTask(id) { tasks = tasks.filter(t => t.id !== id); save(); }

    render();
</script>

<div class="footer">
<hr color="#727a93">
	<p>Концепция и разработка: <a href="https://github.com/ni-oops">ni-oops</a></p>
</div>
</body>
</html>
